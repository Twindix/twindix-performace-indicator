<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Offline - Twindix Performance Indicator</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8FAFC; color: #0F172A; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
            .container { text-align: center; padding: 2rem; }
            .icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; background: #DBEAFE; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
            .icon svg { width: 32px; height: 32px; color: #2563EB; }
            h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
            p { color: #64748B; font-size: 0.875rem; max-width: 320px; margin: 0 auto; }
            button { margin-top: 1.5rem; padding: 0.625rem 1.5rem; background: #2563EB; color: white; border: none; border-radius: 12px; font-size: 0.875rem; font-weight: 600; cursor: pointer; }
            button:hover { background: #1D4ED8; }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M15.536 8.464a5 5 0 010 7.072M8.464 15.536a5 5 0 010-7.072" /><circle cx="12" cy="12" r="1" fill="currentColor" /></svg>
            </div>
            <h1>You're Offline</h1>
            <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
            <button onclick="window.location.reload()">Try Again</button>
        </div>
    </body>
</html>
